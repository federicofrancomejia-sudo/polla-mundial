name: Actualizar resultados

on:
  schedule:
    - cron: "*/15 * * * *"   # cada 15 minutos (UTC) - GitHub puede retrasarse algo
  workflow_dispatch:           # permite correrlo a mano desde GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Sincronizar partidos de eliminatoria
        run: python fetch_partidos.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Actualizar resultados
        run: python fetch_resultados.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
